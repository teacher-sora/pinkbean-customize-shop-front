# main 에 푸시되면 Vercel 프로덕션으로 자동 배포한다.
#
# 이 레포는 Vercel 의 GitHub 연동(자동배포)이 걸려있지 않고 그동안 CLI 로 수동 배포해왔다.
# 그 탓에 main 에 머지해도 실제 사이트에 반영되지 않는 사고가 있었다 → 이 워크플로우로 자동화한다.
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       Vercel 개인 토큰
#   VERCEL_ORG_ID      .vercel/project.json 의 orgId
#   VERCEL_PROJECT_ID  .vercel/project.json 의 projectId
name: Deploy to Vercel (production)

on:
  push:
    branches: [main]
  workflow_dispatch: # 수동 실행(배포 확인·재배포용)

# 같은 시점에 배포가 겹치면 나중 것만 살린다(오래된 배포가 최신을 덮어쓰는 사고 방지).
concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (prebuilt artifact)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "배포됨: $url"
          echo "### ✅ Vercel 프로덕션 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "$url" >> $GITHUB_STEP_SUMMARY
